<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>猪肉铺店铺管家支持</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #231f20;
      background: #f7f4ef;
      line-height: 1.7;
    }
    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 40px 20px 64px;
    }
    h1 {
      font-size: 32px;
      line-height: 1.25;
      margin: 0 0 8px;
    }
    h2 {
      font-size: 20px;
      margin-top: 32px;
    }
    .lead {
      color: #6f6864;
      margin-bottom: 28px;
    }
    section {
      background: #fff;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 8px;
      padding: 18px;
      margin: 16px 0;
    }
    a {
      color: #a91f22;
    }
  </style>
</head>
<body>
  <main>
    <h1>猪肉铺店铺管家支持</h1>
    <p class="lead">这里提供 App 使用帮助、常见问题和联系信息。</p>

    <section>
      <h2>主要功能</h2>
      <p>猪肉铺店铺管家支持分割核算、经营看板、本地核算单保存，并为库存管理、客户管理和财务记录预留入口。</p>
    </section>

    <section>
      <h2>常见问题</h2>
      <p><strong>数据保存在哪里？</strong><br>当前版本的数据保存在用户设备本地。</p>
      <p><strong>是否需要登录？</strong><br>当前版本不需要登录，也不需要测试账号。</p>
      <p><strong>保存核算单后在哪里查看？</strong><br>保存后会回到首页，并显示在近期记录和经营概览中。</p>
    </section>

    <section>
      <h2>联系我们</h2>
      <p>如需反馈问题或提出建议，请通过 App Store 页面联系开发者。</p>
    </section>
  </main>
</body>
</html>
